<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-labelledby="qdayTitle qdayDesc">
  <title id="qdayTitle">QDAY Logo</title>
  <desc id="qdayDesc">Logo QDAY avec style moderne et lumineux</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e9f8e"/>
      <stop offset="100%" stop-color="#0b7f8f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0a3f46" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="8" y="10" width="524" height="120" rx="30" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="78" cy="70" r="35" fill="none" stroke="#ffffff" stroke-width="10"/>
  <path d="M98 90 L114 106" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <text x="145" y="86" fill="#ffffff" font-family="Verdana, Trebuchet MS, sans-serif" font-size="56" font-weight="700" letter-spacing="4">QDAY</text>
  <rect x="18" y="20" width="500" height="20" fill="url(#shine)" opacity="0.6"/>
</svg>
