services:
  - type: web
    name: qday
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PSEUDO
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: require
